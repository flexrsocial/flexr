# /etc/nginx/sites-available/flexr.social
# Aktivieren mit: ln -s /etc/nginx/sites-available/flexr.social /etc/nginx/sites-enabled/
# SSL danach mit: certbot --nginx -d flexr.social -d www.flexr.social

server {
    listen 80;
    server_name flexr.social www.flexr.social;

    # statisches Frontend
    root /flexr/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API an FastAPI/Uvicorn weiterreichen
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
